<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F2027">
<title>태양광 작업일지</title>
<link rel="manifest" href="manifest.json">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root {
  --sun: #F5A623;--sun-light: #FFD580;--sky: #1A6B8A;--sky-dark: #0F2027;
  --sky-mid: #1C3A4A;--panel: #112233;--surface: #162840;--surface2: #1E3550;
  --border: rgba(245,166,35,0.2);--text: #E8F4F8;--text-dim: #7A9BAE;
  --green: #27AE60;--red: #E74C3C;--radius: 12px;--radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--sky-dark);color:var(--text);min-height:100vh;overflow-x:hidden}
.app-header{background:linear-gradient(135deg,var(--sky-dark) 0%,var(--sky-mid) 100%);border-bottom:1px solid var(--border);padding:16px 20px 12px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.app-logo{display:flex;align-items:center;gap:10px}
.sun-icon{width:36px;height:36px;background:radial-gradient(circle,var(--sun-light) 30%,var(--sun) 70%);border-radius:50%;box-shadow:0 0 16px rgba(245,166,35,0.6);flex-shrink:0}
.app-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.app-subtitle{font-size:11px;color:var(--text-dim);margin-top:1px}
.header-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:8px 14px;font-size:12px;cursor:pointer;font-weight:600}
.tab-nav{display:flex;background:var(--panel);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:72px;padding:12px 8px;background:none;border:none;color:var(--text-dim);font-size:11px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap}
.tab-btn .tab-icon{font-size:18px}
.tab-btn.active{color:var(--sun);border-bottom-color:var(--sun)}
.view{display:none;padding:20px;max-width:680px;margin:0 auto}
.view.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--sun);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;color:var(--text-dim);margin-bottom:6px;display:block;font-weight:600}
.form-input,.form-select,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;padding:10px 12px;outline:none;transition:border-color 0.2s;font-family:inherit}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--sun)}
.form-select option{background:var(--surface2)}
.form-textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.btn{padding:12px 20px;border-radius:var(--radius-sm);border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--sun);color:var(--sky-dark)}
.btn-primary:hover{background:var(--sun-light)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:var(--red);color:white}
.btn-green{background:var(--green);color:white}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:7px 12px;font-size:12px}
.log-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color 0.2s}
.log-item:hover{border-color:var(--sun)}
.log-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.log-date{font-size:13px;font-weight:700;color:var(--sun)}
.log-category{font-size:12px;color:var(--text-dim)}
.log-detail{font-size:13px;color:var(--text);margin-top:4px}
.log-manday{display:inline-block;background:rgba(245,166,35,0.15);color:var(--sun);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;margin-top:6px}
.log-photos{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.log-photo-thumb{width:56px;height:56px;object-fit:cover;border-radius:6px;border:1px solid var(--border)}
.photo-upload-area{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:20px;text-align:center;cursor:pointer;transition:border-color 0.2s;color:var(--text-dim);font-size:13px}
.photo-upload-area:hover{border-color:var(--sun);color:var(--sun)}
.photo-preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.photo-preview-item{position:relative;aspect-ratio:1}
.photo-preview-item img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.photo-remove{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.7);color:white;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.summary-table{width:100%;border-collapse:collapse;font-size:13px}
.summary-table th{background:var(--surface2);color:var(--sun);font-size:11px;padding:10px 8px;text-align:center;border-bottom:1px solid var(--border)}
.summary-table td{padding:10px 8px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.05)}
.summary-table tr:hover td{background:rgba(255,255,255,0.03)}
.summary-table .total-row td{color:var(--sun);font-weight:700;border-top:1px solid var(--border)}
.category-badge{display:inline-block;background:rgba(26,107,138,0.3);color:#7EC8E3;border-radius:4px;padding:2px 8px;font-size:11px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-value{font-size:28px;font-weight:700;color:var(--sun)}
.stat-label{font-size:11px;color:var(--text-dim);margin-top:4px}
.work-type-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:8px;border:1px solid var(--border)}
.work-type-name{font-size:13px}
.work-type-cat{font-size:11px;color:var(--text-dim);margin-top:2px}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-bar .form-input{flex:1;min-width:120px}
.loading{text-align:center;padding:40px;color:var(--text-dim)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--sun);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:24px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--panel);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;padding:24px 20px;border-top:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:700;color:var(--sun);margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;color:var(--text-dim);font-size:22px;cursor:pointer}
.setting-item{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-dim)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px}
.config-warning{background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.4);border-radius:var(--radius);padding:16px;margin-bottom:16px;font-size:13px;line-height:1.6;color:var(--sun)}
.work-row{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px;position:relative}
.work-row-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.work-row-num{font-size:11px;font-weight:700;color:var(--sun);background:rgba(245,166,35,0.15);padding:2px 8px;border-radius:10px}
.work-row-remove{background:none;border:none;color:var(--text-dim);font-size:16px;cursor:pointer;padding:0 4px}
.cat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cat-actions{display:flex;gap:6px}
@media(min-width:480px){.tab-btn{font-size:12px}.stat-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-logo">
    <div class="sun-icon"></div>
    <div>
      <div class="app-title">태양광 작업일지</div>
      <div class="app-subtitle" id="site-name-header">현장을 선택하세요</div>
    </div>
  </div>
  <button class="header-btn" onclick="openExportModal()">📊 내보내기</button>
</div>

<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('dashboard')" id="tab-dashboard"><span class="tab-icon">📊</span>대시보드</button>
  <button class="tab-btn" onclick="switchTab('log-list')" id="tab-log-list"><span class="tab-icon">📋</span>작업일지</button>
  <button class="tab-btn" onclick="switchTab('summary')" id="tab-summary"><span class="tab-icon">📈</span>맨데이집계</button>
  <button class="tab-btn" onclick="switchTab('work-db')" id="tab-work-db"><span class="tab-icon">🗂️</span>공종DB</button>
  <button class="tab-btn" onclick="switchTab('settings')" id="tab-settings"><span class="tab-icon">⚙️</span>설정</button>
</div>

<!-- 대시보드 -->
<div class="view active" id="view-dashboard">
  <div id="dashboard-content"><div class="loading"><div class="spinner"></div>로딩 중...</div></div>
</div>

<!-- 작업일지 목록 -->
<div class="view" id="view-log-list">
  <div class="filter-bar">
    <input type="date" class="form-input" id="filter-date-from">
    <input type="date" class="form-input" id="filter-date-to">
    <button class="btn btn-secondary btn-sm" onclick="loadLogs()">🔍</button>
  </div>
  <button class="btn btn-primary btn-full" style="margin-bottom:16px" onclick="openLogModal()">＋ 새 작업일지 작성</button>
  <div id="log-list-content"><div class="loading"><div class="spinner"></div>로딩 중...</div></div>
</div>

<!-- 맨데이 집계 -->
<div class="view" id="view-summary">
  <div class="filter-bar">
    <input type="date" class="form-input" id="sum-date-from">
    <input type="date" class="form-input" id="sum-date-to">
    <button class="btn btn-secondary btn-sm" onclick="loadSummary()">집계</button>
  </div>
  <div id="summary-content"><div class="loading"><div class="spinner"></div>로딩 중...</div></div>
</div>

<!-- 공종 DB -->
<div class="view" id="view-work-db">
  <div class="card">
    <div class="card-title">🗂️ 대분류 추가</div>
    <div style="display:flex;gap:8px">
      <input type="text" class="form-input" id="new-category" placeholder="새 대분류명 (예: 전기공사)">
      <button class="btn btn-primary" style="white-space:nowrap" onclick="addCategory()">추가</button>
    </div>
  </div>
  <div id="work-type-list"><div class="loading"><div class="spinner"></div>로딩 중...</div></div>
</div>

<!-- 설정 -->
<div class="view" id="view-settings">
  <div class="card">
    <div class="card-title">⚙️ Supabase 연결 설정</div>
    <div class="form-group"><label class="form-label">Project URL</label><input type="text" class="form-input" id="sb-url" placeholder="https://xxxx.supabase.co"></div>
    <div class="form-group"><label class="form-label">Anon Key</label><input type="text" class="form-input" id="sb-key" placeholder="eyJh..."></div>
    <button class="btn btn-primary btn-full" onclick="saveConfig()">저장 및 연결</button>
  </div>
  <div class="card">
    <div class="card-title">🏗️ 현장 관리</div>
    <div id="site-list" style="margin-bottom:14px"></div>
    <div class="form-group"><label class="form-label">현장명 *</label><input type="text" class="form-input" id="new-site-name" placeholder="예: ○○ 태양광 발전소 설치공사"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">발주처</label><input type="text" class="form-input" id="new-site-client"></div>
      <div class="form-group"><label class="form-label">시공사</label><input type="text" class="form-input" id="new-site-contractor"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">착공일</label><input type="date" class="form-input" id="new-site-start"></div>
      <div class="form-group"><label class="form-label">준공예정일</label><input type="date" class="form-input" id="new-site-end"></div>
    </div>
    <button class="btn btn-primary btn-full" onclick="addSite()">현장 추가</button>
  </div>
</div>

<!-- 작업일지 작성 모달 -->
<div class="modal-overlay" id="log-modal">
  <div class="modal">
    <div class="modal-title">
      <span id="log-modal-title">📝 작업일지 작성</span>
      <button class="modal-close" onclick="closeLogModal()">✕</button>
    </div>
    <input type="hidden" id="log-edit-id">

    <!-- 공통 정보 -->
    <div class="form-row">
      <div class="form-group"><label class="form-label">작업일자 *</label><input type="date" class="form-input" id="log-date"></div>
      <div class="form-group"><label class="form-label">날씨</label>
        <select class="form-select" id="log-weather">
          <option>☀️ 맑음</option><option>⛅ 구름</option><option>🌧️ 비</option>
          <option>❄️ 눈</option><option>🌫️ 흐림</option><option>💨 바람</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">현장</label><select class="form-select" id="log-site"></select></div>
      <div class="form-group"><label class="form-label">확인자</label><input type="text" class="form-input" id="log-manager"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">시작시간</label><input type="time" class="form-input" id="log-start-time" value="08:00"></div>
      <div class="form-group"><label class="form-label">종료시간</label><input type="time" class="form-input" id="log-end-time" value="17:00"></div>
    </div>
    <div class="form-group"><label class="form-label">특이사항 / 메모</label>
      <input type="text" class="form-input" id="log-memo" placeholder="안전사항, 특이사항 등">
    </div>

    <!-- 작업 항목들 (멀티라인) -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <label class="form-label" style="margin:0">📋 작업 항목 *</label>
      <button class="btn btn-secondary btn-sm" onclick="addWorkRow()">＋ 항목 추가</button>
    </div>
    <div id="work-rows"></div>

    <!-- 사진 -->
    <div class="form-group" style="margin-top:14px">
      <label class="form-label">현장 사진</label>
      <div class="photo-upload-area" onclick="document.getElementById('photo-input').click()">📷 사진을 탭하여 추가 (여러 장 가능)</div>
      <input type="file" id="photo-input" accept="image/*" multiple style="display:none" onchange="handlePhotoSelect(event)">
      <div class="photo-preview-grid" id="photo-preview"></div>
    </div>

    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeLogModal()">취소</button>
      <button class="btn btn-primary" style="flex:2" onclick="saveLog()">💾 저장</button>
    </div>
  </div>
</div>

<!-- 공종 소분류 추가 모달 -->
<div class="modal-overlay" id="sub-modal">
  <div class="modal" style="max-height:50vh">
    <div class="modal-title">
      <span id="sub-modal-title">소분류 추가</span>
      <button class="modal-close" onclick="document.getElementById('sub-modal').classList.remove('open')">✕</button>
    </div>
    <div style="display:flex;gap:8px">
      <input type="text" class="form-input" id="new-sub-input" placeholder="소분류명 입력">
      <button class="btn btn-primary" style="white-space:nowrap" onclick="addSubCategory()">추가</button>
    </div>
  </div>
</div>

<!-- 이름 수정 모달 -->
<div class="modal-overlay" id="edit-name-modal">
  <div class="modal" style="max-height:40vh">
    <div class="modal-title">
      <span>이름 수정</span>
      <button class="modal-close" onclick="document.getElementById('edit-name-modal').classList.remove('open')">✕</button>
    </div>
    <input type="hidden" id="edit-name-id">
    <input type="hidden" id="edit-name-type">
    <input type="hidden" id="edit-name-old">
    <div class="form-group">
      <label class="form-label">새 이름</label>
      <input type="text" class="form-input" id="edit-name-value">
    </div>
    <button class="btn btn-primary btn-full" onclick="saveNameEdit()">저장</button>
  </div>
</div>

<!-- 내보내기 모달 -->
<div class="modal-overlay" id="export-modal">
  <div class="modal">
    <div class="modal-title">📊 데이터 내보내기<button class="modal-close" onclick="document.getElementById('export-modal').classList.remove('open')">✕</button></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">시작일</label><input type="date" class="form-input" id="export-from"></div>
      <div class="form-group"><label class="form-label">종료일</label><input type="date" class="form-input" id="export-to"></div>
    </div>
    <button class="btn btn-green btn-full" onclick="exportCSV()">📥 CSV 다운로드 (엑셀에서 열기 가능)</button>
    <div style="margin-top:10px"><button class="btn btn-secondary btn-full" onclick="exportJSON()">📥 JSON 다운로드</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let sbClient=null,workTypes=[],sites=[],selectedPhotos=[],currentSiteId=null;

function loadConfig(){
  const url=localStorage.getItem('sb_url'),key=localStorage.getItem('sb_key');
  if(url)document.getElementById('sb-url').value=url;
  if(key)document.getElementById('sb-key').value=key;
  if(url&&key){initSupabase(url,key);return true;}
  return false;
}
function initSupabase(url,key){sbClient=window.supabase.createClient(url,key);}
function saveConfig(){
  const url=document.getElementById('sb-url').value.trim(),key=document.getElementById('sb-key').value.trim();
  if(!url||!key){showToast('URL과 Key를 입력하세요','error');return;}
  localStorage.setItem('sb_url',url);localStorage.setItem('sb_key',key);
  initSupabase(url,key);showToast('연결 설정 저장됨 ✓','success');
  setTimeout(()=>loadAll(),500);
}

async function loadAll(){
  if(!sbClient)return;
  await Promise.all([loadWorkTypes(),loadSites()]);
  loadDashboard();loadLogs();loadSummary();
}

window.addEventListener('load',()=>{
  // Supabase 라이브러리 로딩 확인
  if(!window.supabase){
    document.getElementById('dashboard-content').innerHTML='<div class="config-warning">⚠️ 네트워크 오류: 라이브러리를 불러오지 못했습니다. 새로고침해주세요.</div>';
    return;
  }
  // 멀티행 방식으로 변경됨
  const ok=loadConfig();
  if(ok){loadAll();}
  else{showConfigWarning();switchTab('settings');}
});

function showConfigWarning(){
  document.getElementById('dashboard-content').innerHTML=`
    <div class="config-warning">
      ⚠️ <strong>Supabase 연결이 필요합니다.</strong><br><br>
      아래 설정 탭에서 Project URL과 Anon Key를 입력하고<br>

async function loadDashboard(){

  const totalDays=new Set(logs.map(l=>l.work_date)).size;
  const totalWorkers=logs.reduce((s,l)=>s+parseInt(l.workers||0),0);
  const recent=logs.filter(l=>(new Date()-new Date(l.work_date))/86400000<=7);
  const catMap={};
  logs.forEach(l=>{if(!catMap[l.category])catMap[l.category]=0;catMap[l.category]+=parseFloat(l.manday||0);});
  const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

    <div class="stat-grid">
      <div class="stat-card"><div class="stat-value">${totalMd.toFixed(1)}</div><div class="stat-label">총 맨데이 (인·일)</div></div>
      <div class="stat-card"><div class="stat-value">${totalDays}</div><div class="stat-label">총 작업일수</div></div>
      <div class="stat-card"><div class="stat-value">${totalWorkers}</div><div class="stat-label">누적 투입인원</div></div>

    </div>
    <div class="card">
      <div class="card-title">📊 공종별 맨데이 TOP 5</div>
      ${cats.length===0?'<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">데이터 없음</div></div>':
        cats.map(([cat,md])=>`
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <span style="font-size:13px">${cat}</span>
              <span style="color:var(--sun);font-size:13px;font-weight:700">${md.toFixed(1)} 인·일</span>
            </div>
            <div style="background:var(--surface2);border-radius:4px;height:6px">
              <div style="background:var(--sun);height:6px;border-radius:4px;width:${Math.min(100,totalMd>0?md/totalMd*100:0).toFixed(0)}%"></div>
            </div>
          </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">📅 최근 작업일지</div>
      ${logs.length===0?'<div class="empty-state"><div class="empty-text">작업일지 없음</div></div>':
        [...logs].sort((a,b)=>b.work_date.localeCompare(a.work_date)).slice(0,3).map(l=>`

            <span class="log-manday">${l.manday} 인·일 · ${l.workers}명</span>

async function loadSummary(){
  if(!sbClient)return;
  let q=sbClient.from('daily_logs').select('*');
  const from=document.getElementById('sum-date-from')?.value,to=document.getElementById('sum-date-to')?.value;
  if(from)q=q.gte('work_date',from);
  if(to)q=q.lte('work_date',to);
  const{data:logs}=await q;
  const el=document.getElementById('summary-content');
  if(!logs||!logs.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">📈</div><div class="empty-text">집계할 데이터가 없습니다</div></div>`;return;}
  const catMap={};
  logs.forEach(l=>{
    if(!catMap[l.category])catMap[l.category]={subMap:{},days:new Set(),totalMd:0};
    catMap[l.category].totalMd+=parseFloat(l.manday||0);
    catMap[l.category].days.add(l.work_date);
    if(!catMap[l.category].subMap[l.sub_category])catMap[l.category].subMap[l.sub_category]={md:0,days:new Set()};
    catMap[l.category].subMap[l.sub_category].md+=parseFloat(l.manday||0);
    catMap[l.category].subMap[l.sub_category].days.add(l.work_date);
  });
  const totalMd=logs.reduce((s,l)=>s+parseFloat(l.manday||0),0);
  const totalDays=new Set(logs.map(l=>l.work_date)).size;
  let rows='',no=1;
  Object.entries(catMap).forEach(([cat,data])=>{
    rows+=`<tr><td colspan="5" style="text-align:left;padding-left:12px;background:var(--surface2)"><span class="category-badge">${cat}</span> <small style="color:var(--text-dim)">${data.totalMd.toFixed(1)} 인·일</small></td></tr>`;
    Object.entries(data.subMap).forEach(([sub,sd])=>{
      rows+=`<tr><td>${no++}</td><td style="text-align:left;padding-left:20px">${sub}</td><td>${sd.days.size}</td><td>${sd.md.toFixed(1)}</td><td>${totalMd>0?(sd.md/totalMd*100).toFixed(1):0}%</td></tr>`;
    });
  });
  el.innerHTML=`
    <div class="stat-grid" style="grid-template-columns:1fr 1fr">
      <div class="stat-card"><div class="stat-value">${totalMd.toFixed(1)}</div><div class="stat-label">총 맨데이</div></div>
      <div class="stat-card"><div class="stat-value">${totalDays}</div><div class="stat-label">총 작업일수</div></div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="summary-table">
        <thead><tr><th>No</th><th>세부공종</th><th>작업일수</th><th>맨데이(인·일)</th><th>비율</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr class="total-row"><td colspan="2">합 계</td><td>${totalDays}</td><td>${totalMd.toFixed(1)}</td><td>100%</td></tr></tfoot>
      </table>
    </div>`;
}

// 작업 행 추가
let workRowCount=0;
function addWorkRow(data={}){
  workRowCount++;
  const idx=workRowCount;
  const cats=[...new Set(workTypes.map(wt=>wt.category))];
  const catOpts=cats.map(c=>`<option value="${c}" ${data.category===c?'selected':''}>${c}</option>`).join('');
  const subOpts=data.category?workTypes.filter(wt=>wt.category===data.category).map(wt=>`<option value="${wt.sub_category}" ${data.sub_category===wt.sub_category?'selected':''}>${wt.sub_category}</option>`).join(''):'';
  const div=document.createElement('div');
  div.className='work-row';
  div.id=`work-row-${idx}`;
  div.innerHTML=`
    <div class="work-row-header">
      <span class="work-row-num">작업 ${idx}</span>
      <button class="work-row-remove" onclick="removeWorkRow(${idx})">✕</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">공종 (대분류) *</label>
        <select class="form-select" onchange="updateSubOpts(this,${idx})">
          <option value="">선택</option>${catOpts}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">소분류 *</label>
        <select class="form-select" id="sub-${idx}">
          <option value="">선택</option>${subOpts}
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">세부 작업내용</label>
      <textarea class="form-textarea" id="detail-${idx}" style="min-height:60px" placeholder="세부 내용">${data.detail||''}</textarea>
    </div>
    <div class="form-row-3">
      <div class="form-group">
        <label class="form-label">투입인원</label>
        <input type="number" class="form-input" id="workers-${idx}" min="1" placeholder="명" value="${data.workers||''}" oninput="calcRowManday(${idx})">
      </div>
      <div class="form-group">
        <label class="form-label">작업시간(h)</label>
        <input type="number" class="form-input" id="hours-${idx}" min="1" max="24" value="${data.hours||8}" oninput="calcRowManday(${idx})">
      </div>
      <div class="form-group">
        <label class="form-label">맨데이(자동)</label>
        <input type="number" class="form-input" id="manday-${idx}" step="0.1" style="color:var(--sun)" value="${data.manday||''}">
      </div>
    </div>`;
  document.getElementById('work-rows').appendChild(div);
}
function removeWorkRow(idx){
  const el=document.getElementById(`work-row-${idx}`);
  if(el)el.remove();
  if(document.getElementById('work-rows').children.length===0)addWorkRow();
}
function updateSubOpts(sel,idx){
  const cat=sel.value;
  const subs=workTypes.filter(wt=>wt.category===cat);
  document.getElementById(`sub-${idx}`).innerHTML='<option value="">선택</option>'+subs.map(wt=>`<option value="${wt.sub_category}">${wt.sub_category}</option>`).join('');
}
function calcRowManday(idx){
  const w=parseFloat(document.getElementById(`workers-${idx}`).value)||0;
  const h=parseFloat(document.getElementById(`hours-${idx}`).value)||8;
  document.getElementById(`manday-${idx}`).value=w>0?(w*h/8).toFixed(1):'';
}

function closeLogModal(){document.getElementById('log-modal').classList.remove('open');selectedPhotos=[];}
function calcManday(){} // 멀티행으로 대체됨
function handlePhotoSelect(e){
  Array.from(e.target.files).forEach(f=>{
    selectedPhotos.push(f);
    const r=new FileReader();
    r.onload=ev=>{const div=document.createElement('div');div.className='photo-preview-item';div.innerHTML=`<img src="${ev.target.result}"><button class="photo-remove" onclick="this.parentNode.remove();selectedPhotos[${selectedPhotos.length-1}]=null">✕</button>`;document.getElementById('photo-preview').appendChild(div);};
    r.readAsDataURL(f);
  });
  e.target.value='';
}
async function uploadPhotos(logId){
  for(const file of selectedPhotos.filter(p=>p)){
    const ext=file.name.split('.').pop(),path=`${logId}/${Date.now()}.${ext}`;
    const{error}=await sbClient.storage.from('worklog-photos').upload(path,file);
    if(!error){const{data:u}=sbClient.storage.from('worklog-photos').getPublicUrl(path);await sbClient.from('photos').insert({log_id:logId,url:u.publicUrl});}
  }
}
async function saveLog(){
  const date=document.getElementById('log-date').value;
  if(!date){showToast('날짜를 입력하세요','error');return;}
  const siteId=document.getElementById('log-site').value||null;
  const siteName=sites.find(s=>s.id==siteId)?.name||null;
  const weather=document.getElementById('log-weather').value;
  const manager=document.getElementById('log-manager').value;
  const memo=document.getElementById('log-memo').value;
  const startTime=document.getElementById('log-start-time').value;
  const endTime=document.getElementById('log-end-time').value;

  // 작업 행들 수집
  const rows=document.getElementById('work-rows').children;
  const payloads=[];
  for(let i=0;i<rows.length;i++){
    const row=rows[i];
    const idx=row.id.replace('work-row-','');
    const catSel=row.querySelector('select');
    const cat=catSel?catSel.value:'';
    const sub=document.getElementById(`sub-${idx}`)?.value||'';
    const manday=parseFloat(document.getElementById(`manday-${idx}`)?.value)||0;
    if(!cat||!sub){showToast(`항목 ${parseInt(idx)}의 공종을 선택하세요`,'error');return;}
    if(!manday){showToast(`항목 ${parseInt(idx)}의 인원/시간을 입력하세요`,'error');return;}
    const wtObj=workTypes.find(wt=>wt.category===cat&&wt.sub_category===sub);
    payloads.push({
      work_date:date,work_type_id:wtObj?.id||null,
      category:cat,sub_category:sub,
      detail:document.getElementById(`detail-${idx}`)?.value||'',
      manday,workers:parseInt(document.getElementById(`workers-${idx}`)?.value)||null,
      start_time:startTime,end_time:endTime,
      weather,manager,memo,site_name:siteName
    });
  }
  if(!payloads.length){showToast('작업 항목을 추가하세요','error');return;}

  const editId=document.getElementById('log-edit-id').value;
  let firstLogId=null;

  if(editId){
    // 수정 모드: 첫 번째 행만 수정
    const{error}=await sbClient.from('daily_logs').update(payloads[0]).eq('id',editId);
    if(error){showToast('수정 실패: '+error.message,'error');return;}
    firstLogId=editId;
  } else {
    // 신규: 모든 행 insert
    const{data,error}=await sbClient.from('daily_logs').insert(payloads).select();
    if(error){showToast('저장 실패: '+error.message,'error');return;}
    firstLogId=data[0].id;
    // 사진은 첫 번째 레코드에 연결
  }
  if(selectedPhotos.filter(p=>p).length)await uploadPhotos(firstLogId);
  closeLogModal();showToast(`${payloads.length}개 작업 저장 완료 ✓`,'success');
  await loadLogs();await loadDashboard();await loadSummary();
}
async function deleteLog(id){
  if(!confirm('이 작업일지를 삭제할까요?'))return;
  await sbClient.from('daily_logs').delete().eq('id',id);
  await loadLogs();await loadDashboard();await loadSummary();showToast('삭제됨','success');
}

function openExportModal(){document.getElementById('export-modal').classList.add('open');}
async function exportCSV(){
  const{data:logs}=await sbClient.from('daily_logs').select('*').order('work_date');
  if(!logs||!logs.length){showToast('데이터가 없습니다','error');return;}
  const h=['날짜','현장','대분류','소분류','세부내용','투입인원','맨데이','시작','종료','날씨','확인자','메모'];
  const rows=logs.map(l=>[l.work_date,l.site_name||'',l.category,l.sub_category,l.detail||'',l.workers||'',l.manday,l.start_time||'',l.end_time||'',l.weather||'',l.manager||'',l.memo||''].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv='\uFEFF'+[h.join(','),...rows].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=`작업일지_${new Date().toISOString().split('T')[0]}.csv`;a.click();
  document.getElementById('export-modal').classList.remove('open');
}
async function exportJSON(){
  const{data:logs}=await sbClient.from('daily_logs').select('*,photos(*)').order('work_date');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(logs,null,2)],{type:'application/json'}));
  a.download=`작업일지_${new Date().toISOString().split('T')[0]}.json`;a.click();
  document.getElementById('export-modal').classList.remove('open');
}

function showToast(msg,type=''){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;
  setTimeout(()=>t.className='toast',2500);
}
