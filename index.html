<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F2027">
<title>태양광 작업일지</title>
<link rel="manifest" href="manifest.json">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
:root{
  --sun:#F5A623;--sun-light:#FFD580;--sky-dark:#0F2027;--sky-mid:#1C3A4A;
  --panel:#112233;--surface:#162840;--surface2:#1E3550;
  --border:rgba(245,166,35,0.2);--text:#E8F4F8;--text-dim:#7A9BAE;
  --green:#27AE60;--red:#E74C3C;--radius:12px;--radius-sm:8px;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--sky-dark);color:var(--text);min-height:100vh}
/* 헤더 */
.app-header{background:linear-gradient(135deg,var(--sky-dark),var(--sky-mid));border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.app-logo{display:flex;align-items:center;gap:10px}
.sun-icon{width:34px;height:34px;background:radial-gradient(circle,var(--sun-light) 30%,var(--sun) 70%);border-radius:50%;box-shadow:0 0 14px rgba(245,166,35,0.6);flex-shrink:0}
.header-info{display:flex;flex-direction:column}
.app-title{font-size:15px;font-weight:700;color:var(--text)}
.header-site{font-size:12px;font-weight:700;color:var(--sun);margin-top:1px}
.header-site.empty{color:var(--text-dim);font-weight:400}
.header-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:7px 12px;font-size:11px;cursor:pointer;font-weight:600}
/* 탭 */
.tab-nav{display:flex;background:var(--panel);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:68px;padding:10px 6px;background:none;border:none;color:var(--text-dim);font-size:10px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:2px solid transparent;transition:all 0.2s}
.tab-btn .ti{font-size:17px}
.tab-btn.active{color:var(--sun);border-bottom-color:var(--sun)}
/* 뷰 */
.view{display:none;padding:16px;max-width:680px;margin:0 auto}
.view.active{display:block}
/* 카드 */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--sun);margin-bottom:12px}
/* 폼 */
.fg{margin-bottom:12px}
.fl{font-size:11px;color:var(--text-dim);margin-bottom:5px;display:block;font-weight:600}
.fi,.fs,.ft{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;padding:9px 11px;outline:none;transition:border-color 0.2s;font-family:inherit}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--sun)}
.fs option{background:var(--surface2)}
.ft{resize:vertical;min-height:70px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
/* 버튼 */
.btn{padding:10px 16px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center;gap:5px}
.bp{background:var(--sun);color:#0F2027}
.bp:active{background:var(--sun-light)}
.bs{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.bd{background:var(--red);color:#fff}
.bg{background:var(--green);color:#fff}
.bfull{width:100%}
.bsm{padding:6px 10px;font-size:11px}
/* 통계 */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.stat-val{font-size:26px;font-weight:700;color:var(--sun)}
.stat-lbl{font-size:11px;color:var(--text-dim);margin-top:3px}
/* 작업일지 날짜 그룹 */
.log-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.log-group-header{padding:12px 16px;background:var(--surface2);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.log-group-date{font-size:14px;font-weight:700;color:var(--sun)}
.log-group-meta{font-size:11px;color:var(--text-dim);margin-top:2px}
.log-group-body{padding:12px 16px;border-top:1px solid var(--border)}
.log-item-row{padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.log-item-row:last-child{border-bottom:none}
.log-cat{font-size:12px;font-weight:700;color:var(--sun);margin-bottom:3px}
.log-sub{font-size:11px;color:var(--text-dim)}
.log-detail{font-size:13px;color:var(--text);margin-top:4px}
.log-manday-badge{display:inline-block;background:rgba(245,166,35,0.15);color:var(--sun);border-radius:12px;padding:2px 8px;font-size:11px;font-weight:700;margin-top:4px}
.log-photos-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.log-thumb{width:52px;height:52px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:pointer}
/* 완료 상태 */
.status-done-early{border-left:3px solid var(--green)!important}
.status-done-late{border-left:3px solid var(--red)!important}
.status-badge{display:inline-block;border-radius:10px;padding:2px 8px;font-size:10px;font-weight:700;margin-left:6px}
.sb-early{background:rgba(39,174,96,0.2);color:var(--green)}
.sb-late{background:rgba(231,76,60,0.2);color:var(--red)}
.sb-ongoing{background:rgba(245,166,35,0.15);color:var(--sun)}
/* 계획 카드 */
.plan-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px}
.plan-item.completed-early{border-left:3px solid #29B6F6}
.plan-item.completed-late{border-left:3px solid var(--red)}
.plan-item.ongoing{border-left:3px solid var(--sun)}
/* 집계 테이블 */
.sum-table{width:100%;border-collapse:collapse;font-size:12px}
.sum-table th{background:var(--surface2);color:var(--sun);font-size:11px;padding:9px 7px;text-align:center;border-bottom:1px solid var(--border)}
.sum-table td{padding:9px 7px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.05);vertical-align:top}
.sum-table td.left{text-align:left}
.sum-table .total td{color:var(--sun);font-weight:700;border-top:1px solid var(--border)}
.date-chip{display:inline-block;background:rgba(26,107,138,0.3);color:#7EC8E3;border-radius:3px;padding:1px 5px;font-size:10px;margin:1px}
/* 공종DB */
.drag-handle{cursor:grab;color:var(--text-dim);font-size:16px;padding:0 4px;user-select:none;touch-action:none}
.wt-item{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:7px;border:1px solid var(--border)}
.cat-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
/* 현장 */
.site-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px}
.site-item.active{border-color:var(--sun);background:rgba(245,166,35,0.06)}
.site-badge{display:inline-block;background:var(--sun);color:#0F2027;border-radius:3px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:5px}
/* 사진 */
.photo-zone{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:16px;text-align:center;cursor:pointer;color:var(--text-dim);font-size:13px;transition:border-color 0.2s}
.photo-zone:hover{border-color:var(--sun);color:var(--sun)}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:8px}
.photo-item{position:relative;aspect-ratio:1}
.photo-item img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.photo-rm{position:absolute;top:3px;right:3px;background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* 작업행 */
.work-row{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px}
.work-row-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.work-row-num{font-size:11px;font-weight:700;color:var(--sun);background:rgba(245,166,35,0.15);padding:2px 8px;border-radius:10px}
/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--panel);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;padding:20px 16px;border-top:1px solid var(--border)}
.modal-title{font-size:15px;font-weight:700;color:var(--sun);margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer}
/* 필터바 */
.filter-bar{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-bar .fi{flex:1;min-width:110px}
/* 로딩 */
.loading{text-align:center;padding:36px;color:var(--text-dim)}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--sun);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
/* 토스트 */
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:20px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}
/* 기타 */
.empty{text-align:center;padding:36px 16px;color:var(--text-dim)}
.empty-icon{font-size:36px;margin-bottom:10px}
.config-warn{background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.4);border-radius:var(--radius);padding:14px;font-size:13px;line-height:1.6;color:var(--sun)}
.search-box{display:flex;gap:7px;margin-bottom:12px}
.search-box .fi{flex:1}
@media(min-width:480px){.stat-grid{grid-template-columns:repeat(4,1fr)}}
/* 작업일지 대분류 그룹 스타일 */
.log-cat-block{margin-bottom:16px}
.log-cat-block-header{display:flex;align-items:center;gap:8px;padding:7px 0 9px;border-bottom:2px solid rgba(245,166,35,0.3);margin-bottom:0}
.log-cat-block-name{font-size:14px;font-weight:700;color:var(--sun)}
.log-cat-block-total{font-size:12px;color:var(--text-dim);margin-left:auto}
.log-sub-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;padding:9px 0 9px 12px;border-bottom:1px solid rgba(255,255,255,0.04)}
.log-sub-row:last-child{border-bottom:none}
.log-sub-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.log-sub-detail{font-size:12px;color:var(--text-dim);margin-bottom:5px;line-height:1.45}
.log-sub-stats{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.stat-pill{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:600;border-radius:10px;padding:2px 9px}
.stat-pill.workers{background:rgba(126,200,227,0.12);color:#7EC8E3}
.stat-pill.hours{background:rgba(255,255,255,0.06);color:var(--text-dim)}
.stat-pill.manday{background:rgba(245,166,35,0.15);color:var(--sun)}
.log-sub-actions{display:flex;gap:4px;align-self:flex-start;padding-top:2px}
/* 사진 뷰어 */
#photo-viewer-modal{cursor:zoom-out}
/* PC 폰트 확대 */
@media(min-width:768px){
  body{font-size:16px}
  .app-header{padding:14px 24px}
  .app-title{font-size:18px}
  .header-site{font-size:14px}
  .sun-icon{width:40px;height:40px}
  .tab-btn{font-size:13px;padding:13px 12px}
  .tab-btn .ti{font-size:21px}
  .view{padding:20px 28px;max-width:800px}
  .card{padding:20px}
  .card-title{font-size:16px;margin-bottom:16px}
  .fl{font-size:13px}
  .fi,.fs,.ft{font-size:16px;padding:11px 14px}
  .btn{font-size:14px;padding:11px 18px}
  .bsm{font-size:12px;padding:7px 12px}
  .stat-val{font-size:32px}
  .stat-lbl{font-size:13px}
  .log-group-date{font-size:17px}
  .log-group-meta{font-size:13px}
  .log-group-header{padding:14px 20px}
  .log-group-body{padding:14px 20px}
  .log-cat-block-name{font-size:16px}
  .log-cat-block-total{font-size:13px}
  .log-sub-name{font-size:15px}
  .log-sub-detail{font-size:13px}
  .stat-pill{font-size:13px;padding:3px 10px}
  .sum-table{font-size:14px}
  .sum-table th{font-size:13px;padding:11px 10px}
  .sum-table td{padding:10px 10px}
  .date-chip{font-size:12px;padding:2px 7px}
  .modal-title{font-size:17px}
  .modal{padding:24px 20px}
  .wt-item{padding:12px 16px;font-size:14px}
  .plan-item{padding:16px;font-size:14px}
  .toast{font-size:14px}
  .header-btn{font-size:13px;padding:9px 16px}
}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="app-header">
  <div class="app-logo">
    <div class="sun-icon"></div>
    <div class="header-info">
      <div class="app-title">태양광 작업일지</div>
      <div class="header-site empty" id="header-site">현장을 선택하세요</div>
    </div>
  </div>
  <div style="display:flex;gap:6px">
    <button class="header-btn" onclick="openExportModal()">📊 내보내기</button>
    <button class="header-btn" onclick="exportPhotos()" style="background:rgba(245,166,35,0.15);border-color:rgba(245,166,35,0.4);color:var(--sun)">📷 사진</button>
  </div>
</div>

<!-- 탭 -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('dashboard')" id="tab-dashboard"><span class="ti">📊</span>대시보드</button>
  <button class="tab-btn" onclick="switchTab('logs')" id="tab-logs"><span class="ti">📋</span>작업일지</button>
  <button class="tab-btn" onclick="switchTab('summary')" id="tab-summary"><span class="ti">📈</span>M/D집계</button>
  <button class="tab-btn" onclick="switchTab('workdb')" id="tab-workdb"><span class="ti">🗂️</span>공종DB</button>
  <button class="tab-btn" onclick="switchTab('settings')" id="tab-settings"><span class="ti">⚙️</span>설정</button>
</div>

<!-- 대시보드 -->
<div class="view active" id="view-dashboard">
  <div id="dash-content"><div class="loading"><div class="spinner"></div>로딩 중...</div></div>
</div>

<!-- 작업일지 -->
<div class="view" id="view-logs">
  <div class="filter-bar">
    <input type="date" class="fi" id="log-filter-from">
    <input type="date" class="fi" id="log-filter-to">
    <button class="btn bs bsm" onclick="loadLogs()">🔍</button>
  </div>
  <button class="btn bp bfull" style="margin-bottom:14px" onclick="openLogModal()">＋ 새 작업일지 작성</button>
  <div id="logs-content"><div class="loading"><div class="spinner"></div>로딩 중...</div></div>
</div>

<!-- M/D 집계 -->
<div class="view" id="view-summary">
  <div class="search-box">
    <select class="fs" id="sum-search" onchange="loadSummary()" style="flex:1">
      <option value="">전체 공종</option>
    </select>
    <button class="btn bs bsm" onclick="clearSumSearch()">초기화</button>
  </div>
  <div class="filter-bar">
    <input type="date" class="fi" id="sum-from">
    <input type="date" class="fi" id="sum-to">
    <button class="btn bs bsm" onclick="loadSummary()">집계</button>
  </div>
  <div id="sum-content"><div class="loading"><div class="spinner"></div>로딩 중...</div></div>
</div>

<!-- 공종 DB -->
<div class="view" id="view-workdb">
  <div class="card">
    <div class="card-title">🗂️ 대분류 추가</div>
    <div style="display:flex;gap:8px">
      <input type="text" class="fi" id="new-cat" placeholder="새 대분류명">
      <button class="btn bp bsm" onclick="addCategory()" style="white-space:nowrap">추가</button>
    </div>
  </div>
  <div id="wt-list"><div class="loading"><div class="spinner"></div>로딩 중...</div></div>
</div>

<!-- 설정 -->
<div class="view" id="view-settings">
  <div class="card">
    <div class="card-title">⚙️ Supabase 연결</div>
    <div class="fg"><label class="fl">Project URL</label><input type="text" class="fi" id="sb-url" placeholder="https://xxxx.supabase.co"></div>
    <div class="fg"><label class="fl">Anon Key</label><input type="text" class="fi" id="sb-key" placeholder="eyJh..."></div>
    <button class="btn bp bfull" onclick="saveConfig()">저장 및 연결</button>
  </div>
  <div class="card">
    <div class="card-title">🏗️ 현장 관리</div>
    <div id="site-list" style="margin-bottom:14px"></div>
    <div class="fg"><label class="fl">현장명 *</label><input type="text" class="fi" id="new-site-name" placeholder="○○ 태양광 발전소 설치공사"></div>
    <div class="fr">
      <div class="fg"><label class="fl">발주처</label><input type="text" class="fi" id="new-site-client"></div>
      <div class="fg"><label class="fl">시공사</label><input type="text" class="fi" id="new-site-contractor"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">착공일</label><input type="date" class="fi" id="new-site-start"></div>
      <div class="fg"><label class="fl">준공예정일</label><input type="date" class="fi" id="new-site-end"></div>
    </div>
    <button class="btn bp bfull" onclick="addSite()">현장 추가</button>
  </div>
</div>

<!-- ══ 모달들 ══ -->

<!-- 작업일지 작성 모달 -->
<div class="modal-overlay" id="log-modal">
  <div class="modal">
    <div class="modal-title">
      <span id="log-modal-title">📝 작업일지 작성</span>
      <button class="modal-close" onclick="closeLogModal()">✕</button>
    </div>
    <input type="hidden" id="log-edit-group">
    <div class="fr">
      <div class="fg"><label class="fl">작업일자 *</label><input type="date" class="fi" id="log-date"></div>
      <div class="fg"><label class="fl">날씨</label>
        <select class="fs" id="log-weather">
          <option>☀️ 맑음</option><option>⛅ 구름</option><option>🌧️ 비</option>
          <option>❄️ 눈</option><option>🌫️ 흐림</option><option>💨 바람</option>
        </select>
      </div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">현장</label><select class="fs" id="log-site"></select></div>
      <div class="fg"><label class="fl">확인자</label><input type="text" class="fi" id="log-manager"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">시작시간</label><input type="time" class="fi" id="log-start" value="08:00"></div>
      <div class="fg"><label class="fl">종료시간</label><input type="time" class="fi" id="log-end" value="17:00"></div>
    </div>
    <div class="fg"><label class="fl">특이사항</label><input type="text" class="fi" id="log-memo"></div>

    <!-- 대분류 카드 -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <label class="fl" style="margin:0">📋 작업 대분류 *</label>
      <button class="btn bp bsm" onclick="addCatBlock()">＋ 대분류 추가</button>

<div class="modal-overlay" id="photo-viewer-modal" onclick="closePhotoViewer()" style="align-items:center;background:rgba(0,0,0,0.92)">

      <button class="btn bs bsm" onclick="closePhotoViewer()">✕ 닫기</button>
      <a id="photo-viewer-dl" href="" download style="text-decoration:none">
        <button class="btn bp bsm">📥 다운로드</button>
      </a>
    </div>
  </div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// 전역 상태
// ═══════════════════════════════════════════
let sbClient=null, workTypes=[], sites=[], selectedPhotos=[], currentSiteId=null;

// ── 설정 ──
function loadConfig(){
  const url=localStorage.getItem('sb_url'), key=localStorage.getItem('sb_key');
  const urlEl=document.getElementById('sb-url'), keyEl=document.getElementById('sb-key');
  if(urlEl&&url) urlEl.value=url;
  if(keyEl&&key) keyEl.value=key;
  if(url&&key){sbClient=window.supabase.createClient(url,key);return true;}
  return false;
}
function saveConfig(){
  const url=document.getElementById('sb-url').value.trim(), key=document.getElementById('sb-key').value.trim();
  if(!url||!key){toast('URL과 Key를 입력하세요','err');return;}
  localStorage.setItem('sb_url',url); localStorage.setItem('sb_key',key);
  sbClient=window.supabase.createClient(url,key);
  toast('연결 설정 저장됨 ✓','ok');
  setTimeout(()=>loadAll(),400);
}

// ── 초기화 ──
window.addEventListener('load',()=>{
  if(!window.supabase){
    document.getElementById('dash-content').innerHTML='<div class="config-warn">⚠️ 라이브러리 로딩 실패. 새로고침해주세요.</div>';
    return;
  }
  const ok=loadConfig();
  if(ok) loadAll();
  else{ showConfigWarning(); switchTab('settings'); }
});

function showConfigWarning(){
  document.getElementById('dash-content').innerHTML='<div class="config-warn">⚠️ <strong>설정</strong> 탭에서 Supabase URL과 Anon Key를 입력해주세요.</div>';
  ['logs-content','sum-content','wt-list'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML='';});
}

async function loadAll(){
  if(!sbClient) return;
  // 현장 복원
  const sid=localStorage.getItem('sel_site_id');
  const sname=localStorage.getItem('sel_site_name');
  if(sid&&sname){ currentSiteId=parseInt(sid); updateHeaderSite(sname); }
  await Promise.all([loadWorkTypes(), loadSites()]);
  await initDateFilters();
  loadDashboard(); loadLogs(); loadSummary();
}

async function initDateFilters(){
  // DB에서 작업일지 min/max 날짜 가져와서 필터에 자동 세팅
  try{
    const{data}=await sbClient.from('daily_logs').select('work_date').order('work_date',{ascending:true});
    if(!data||!data.length) return;
    const minDate=data[0].work_date;
    const maxDate=data[data.length-1].work_date;
    // 작업일지 필터
    const lf=document.getElementById('log-filter-from');
    const lt=document.getElementById('log-filter-to');
    if(lf&&!lf.value) lf.value=minDate;
    if(lt&&!lt.value) lt.value=maxDate;
    // M/D 집계 필터
    const sf=document.getElementById('sum-from');
    const st=document.getElementById('sum-to');
    if(sf&&!sf.value) sf.value=minDate;
    if(st&&!st.value) st.value=maxDate;
  }catch(e){}
}

// ── 탭 ──
function switchTab(tab){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

function updateHeaderSite(name){
  const el=document.getElementById('header-site');
  if(!el) return;
  if(name){ el.textContent='📍 '+name; el.className='header-site'; }
  else{ el.textContent='현장을 선택하세요'; el.className='header-site empty'; }
}

// ═══════════════════════════════════════════
// 대시보드
// ═══════════════════════════════════════════
async function loadDashboard(){
  if(!sbClient) return;
  const el=document.getElementById('dash-content');
  const[{data:logs,error:e1},{data:plans,error:e2}]=await Promise.all([
    sbClient.from('daily_logs').select('*'),
    sbClient.from('work_plans').select('*')
  ]);
  if(e1){ el.innerHTML=`<div class="config-warn">⚠️ DB 오류: ${e1.message}</div>`; return; }

  const allLogs=logs||[];
  const allPlans=plans||[];
  cachePlans(allPlans); // 수정 모달용 캐시

  // 현장 필터링
  const siteLogs=currentSiteId? allLogs.filter(l=>l.site_name===sites.find(s=>s.id===currentSiteId)?.name) : allLogs;
  const sitePlans=currentSiteId? allPlans.filter(p=>p.site_name===sites.find(s=>s.id===currentSiteId)?.name) : allPlans;

  // 날짜별 고유 인원 계산 (같은 날 같은 인원 수 중복 안 함)
  const dateWorkerMap={};
  siteLogs.forEach(l=>{
    if(!dateWorkerMap[l.work_date]) dateWorkerMap[l.work_date]=l.workers||0;
    else dateWorkerMap[l.work_date]=Math.max(dateWorkerMap[l.work_date],l.workers||0);
  });
  const totalWorkers=Object.values(dateWorkerMap).reduce((s,v)=>s+v,0);
  const totalMd=siteLogs.reduce((s,l)=>s+parseFloat(l.manday||0),0);
  const totalDays=new Set(siteLogs.map(l=>l.work_date)).size;
  const recent7=new Set(siteLogs.filter(l=>(new Date()-new Date(l.work_date))/86400000<=7).map(l=>l.work_date)).size;

  // 현장 카드
  const selSite=sites.find(s=>s.id===currentSiteId);
  const siteCard=selSite?`
    <div class="card" style="border-color:rgba(245,166,35,0.5);margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:15px;font-weight:700;color:var(--sun);margin-bottom:5px">${selSite.name}</div>
          <div style="font-size:12px;color:var(--text-dim);line-height:1.9">
            ${selSite.client?'발주처: '+selSite.client+'<br>':''}
            ${selSite.contractor?'시공사: '+selSite.contractor+'<br>':''}
            ${selSite.start_date?'착공: '+selSite.start_date+(selSite.end_date?' ~ 준공: '+selSite.end_date:''):''}
          </div>
        </div>
        <button class="btn bs bsm" onclick="switchTab('settings')">관리</button>
      </div>
    </div>`
    :'<div class="config-warn" style="margin-bottom:14px">🏗️ 설정 탭에서 현장을 선택해주세요</div>';

  // 예상 총 M/D (계획 합산)
  const plannedTotal=sitePlans.reduce((s,p)=>s+parseFloat(p.planned_manday||0),0);
  const remainMd=plannedTotal-totalMd;
  const remainColor=remainMd<0?'var(--red)':'#29B6F6';

  // 통계
  const statsHtml=`
    <div class="stat-grid" style="grid-template-columns:repeat(2,1fr)">
      <div class="stat-card" style="border-color:rgba(245,166,35,0.4)">
        <div class="stat-val">${plannedTotal.toFixed(2)}</div>
        <div class="stat-lbl">예상 총 M/D</div>
      </div>
      <div class="stat-card" style="border-color:rgba(41,182,246,0.4)">
        <div class="stat-val" style="color:#29B6F6">${totalMd.toFixed(2)}</div>
        <div class="stat-lbl">현재 M/D</div>
      </div>
      <div class="stat-card" style="border-color:${remainMd<0?'rgba(231,76,60,0.4)':'rgba(41,182,246,0.2)'}">
        <div class="stat-val" style="color:${remainColor}">${Math.abs(remainMd).toFixed(2)}${remainMd<0?' ▲':' ▼'}</div>
        <div class="stat-lbl">${remainMd<0?'초과 M/D':'남은 M/D'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${totalDays}</div>
        <div class="stat-lbl">작업일수</div>
      </div>
    </div>`;

  // 대분류별 실제 맨데이 자동 집계 (작업일지 DB 기준)
  const actualByCategory={};
  siteLogs.forEach(l=>{
    if(!actualByCategory[l.category]) actualByCategory[l.category]=0;
    actualByCategory[l.category]+=parseFloat(l.manday||0);
  });

  // 작업 계획 vs 실적
  const planHtml=`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="card-title" style="margin:0">📌 작업 계획 현황</div>
        <button class="btn bp bsm" onclick="openPlanModal()">＋ 계획 추가</button>
      </div>
      ${sitePlans.length===0?'<div class="empty"><div class="empty-icon">📭</div>작업 계획을 추가해보세요</div>':
        sitePlans.map(p=>{
          const actual=actualByCategory[p.category]||0;
          const planned=parseFloat(p.planned_manday||0);
          const pct=planned>0?Math.round(actual/planned*100):0;
          let cls='ongoing', badge='<span class="status-badge sb-ongoing">진행중</span>';
          if(p.is_completed){
            cls=actual<=planned?'completed-early':'completed-late';
            badge=actual<=planned
              ?'<span class="status-badge sb-early" style="background:rgba(41,182,246,0.2);color:#29B6F6">✓ 일정 내 완료</span>'
              :'<span class="status-badge sb-late">✓ 지연 완료</span>';
          }
          const completedDateHtml=p.is_completed&&p.completed_at
            ?`<span style="font-size:11px;color:var(--text-dim);margin-left:6px">완료일: ${p.completed_at}</span>`:''
          return `<div class="plan-item ${cls}">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div style="flex:1">
                <div style="font-size:13px;font-weight:700">${p.category}${badge}${completedDateHtml}</div>
                ${p.note?`<div style="font-size:12px;color:var(--text-dim);margin-top:2px">${p.note}</div>`:''}
                <div style="font-size:12px;color:var(--text-dim);margin-top:4px">
                  예상 <strong style="color:var(--sun)">${planned.toFixed(2)}</strong> M/D → 실적 <strong style="color:${actual<=planned?'#29B6F6':'var(--red)'}">${actual.toFixed(2)}</strong> M/D
                  ${planned>0?`<span style="color:${pct<=100?'#29B6F6':'var(--red)'}"> (${pct}%)</span>`:''}
                </div>
                ${!p.is_completed&&actual>0?`<div style="margin-top:6px;background:var(--sky-dark);border-radius:4px;height:5px;overflow:hidden"><div style="height:100%;width:${Math.min(pct,100)}%;background:${pct<=100?'#29B6F6':'var(--red)'};transition:width 0.4s"></div></div>`:''}
              </div>
              <div style="display:flex;gap:5px;margin-left:8px">
                ${!p.is_completed?`<button class="btn bg bsm" onclick="openCompleteModal(${p.id},${planned},${actual})">완료</button>`:''}
                <button class="btn bs bsm" onclick="openEditPlanModal(${p.id})">✏️</button>
                <button class="btn bd bsm" onclick="deletePlan(${p.id})">삭제</button>
              </div>
            </div>
          </div>`;
        }).join('')}
    </div>`;

  el.innerHTML=siteCard+statsHtml+planHtml;
}

// ── 계획 ──
let planRowCount=0;

function openPlanModal(){
  document.getElementById('plan-modal-title').textContent='📌 작업 계획 추가';
  document.getElementById('plan-edit-id').value='';
  document.getElementById('plan-rows').innerHTML='';
  planRowCount=0;
  // 현장
  const sel=document.getElementById('plan-site');
  sel.innerHTML='<option value="">현장 선택</option>'+sites.map(s=>`<option value="${s.name}">${s.name}</option>`).join('');
  if(currentSiteId){ const site=sites.find(s=>s.id===currentSiteId); if(site) sel.value=site.name; }
  addPlanRow();
  document.getElementById('plan-total-md').textContent='0.00';
  document.getElementById('plan-modal').classList.add('open');
}

function openEditPlanModal(id){
  // 단일 항목 수정
  const plans_all=window._cachedPlans||[];
  const p=plans_all.find(x=>x.id===id);
  if(!p) return;
  document.getElementById('plan-modal-title').textContent='📌 계획 수정';
  document.getElementById('plan-edit-id').value=id;
  document.getElementById('plan-rows').innerHTML='';
  planRowCount=0;
  const sel=document.getElementById('plan-site');
  sel.innerHTML='<option value="">현장 선택</option>'+sites.map(s=>`<option value="${s.name}">${s.name}</option>`).join('');
  if(p.site_name) sel.value=p.site_name;
  addPlanRow({category:p.category, md:p.planned_manday, note:p.note||''});
  updatePlanTotal();
  document.getElementById('plan-modal').classList.add('open');
}

function addPlanRow(data={}){
  planRowCount++;
  const rid=planRowCount;
  const cats=[...new Set(workTypes.map(w=>w.category))];
  const catOpts=cats.map(cat=>`<option value="${cat}" ${data.category===cat?'selected':''}>${cat}</option>`).join('');
  const div=document.createElement('div');
  div.id=`pr-${rid}`;
  div.style.cssText='background:var(--sky-dark);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px';
  div.innerHTML=`
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <select class="fs" id="prc-${rid}" style="flex:1" onchange="updatePlanTotal()">
        <option value="">공종(대분류) 선택 *</option>${catOpts}
      </select>
      <button class="btn bd bsm" onclick="removePlanRow(${rid})" style="padding:5px 8px">✕</button>
    </div>
    <div style="display:flex;gap:8px">
      <div class="fg" style="flex:1;margin-bottom:0">
        <label class="fl">예상 M/D *</label>
        <input type="number" class="fi" id="prm-${rid}" step="0.01" min="0.01" placeholder="0.00"
          value="${data.md||''}" oninput="updatePlanTotal()">
      </div>
      <div class="fg" style="flex:2;margin-bottom:0">
        <label class="fl">비고</label>
        <input type="text" class="fi" id="prn-${rid}" placeholder="메모" value="${data.note||''}">
      </div>
    </div>`;
  document.getElementById('plan-rows').appendChild(div);
}

function removePlanRow(rid){
  document.getElementById(`pr-${rid}`)?.remove();
  updatePlanTotal();
}

function updatePlanTotal(){
  let total=0;
  document.querySelectorAll('#plan-rows [id^="prm-"]').forEach(el=>{
    total+=parseFloat(el.value)||0;
  });
  const el=document.getElementById('plan-total-md');
  if(el) el.textContent=total.toFixed(2);
}

async function savePlanAll(){
  const siteName=document.getElementById('plan-site').value||null;
  const editId=document.getElementById('plan-edit-id').value;
  const rows=document.querySelectorAll('#plan-rows>[id^="pr-"]');
  if(!rows.length){ toast('공종을 추가하세요','err'); return; }

  if(editId){
    // 수정: 첫 번째 행만
    const rid=rows[0].id.replace('pr-','');
    const cat=document.getElementById(`prc-${rid}`)?.value;
    const md=parseFloat(document.getElementById(`prm-${rid}`)?.value)||0;
    if(!cat||!md){ toast('공종과 M/D를 입력하세요','err'); return; }
    const{error}=await sbClient.from('work_plans').update({
      site_name:siteName, category:cat, planned_manday:md,
      note:document.getElementById(`prn-${rid}`)?.value||''
    }).eq('id',editId);
    if(error){ toast('수정 실패','err'); return; }
    toast('계획 수정됨 ✓','ok');
  } else {
    // 추가: 여러 행
    const payloads=[];
    for(const row of rows){
      const rid=row.id.replace('pr-','');
      const cat=document.getElementById(`prc-${rid}`)?.value;
      const md=parseFloat(document.getElementById(`prm-${rid}`)?.value)||0;
      if(!cat||!md){ toast('모든 공종의 M/D를 입력하세요','err'); return; }
      payloads.push({
        site_name:siteName, category:cat, planned_manday:md,
        note:document.getElementById(`prn-${rid}`)?.value||''
      });
    }
    const{error}=await sbClient.from('work_plans').insert(payloads);
    if(error){ toast('저장 실패','err'); return; }
    toast(`${payloads.length}개 계획 저장됨 ✓`,'ok');
  }
  document.getElementById('plan-modal').classList.remove('open');
  loadDashboard();
}

async function deletePlan(id){
  if(!confirm('계획을 삭제할까요?')) return;
  await sbClient.from('work_plans').delete().eq('id',id);
  toast('삭제됨','ok'); loadDashboard();
}

// ═══════════════════════════════════════════
async function loadLogs(){
  if(!sbClient) return;
  let q=sbClient.from('daily_logs').select('*,photos(id,url)').order('work_date',{ascending:false});
  const from=document.getElementById('log-filter-from')?.value;
  const to=document.getElementById('log-filter-to')?.value;
  if(from) q=q.gte('work_date',from);
  if(to) q=q.lte('work_date',to);
  const{data:logs,error}=await q;
  const el=document.getElementById('logs-content');
  if(error){ el.innerHTML=`<div class="config-warn">⚠️ ${error.message}</div>`; return; }
  if(!logs||!logs.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">📋</div>작업일지가 없습니다</div>';
    return;
  }
  // 날짜별 그룹핑
  const groups={};
  logs.forEach(l=>{
    if(!groups[l.work_date]) groups[l.work_date]=[];
    groups[l.work_date].push(l);
  });

  const dateKeys=Object.keys(groups);

  el.innerHTML=dateKeys.map((date,dateIdx)=>{
    const items=groups[date];
    const totalMd=items.reduce((s,l)=>s+parseFloat(l.manday||0),0);
    const maxWorkers=Math.max(...items.map(l=>l.workers||0));
    const cats=[...new Set(items.map(l=>l.category))].join(', ');
    const manager=items[0].manager||'';
    const weather=items[0].weather||'';
    const isLatest=(dateIdx===0);

    // 대분류별 그룹핑
    const catGroups={};
    const catOrder=[];
    items.forEach(l=>{
      if(!catGroups[l.category]){catGroups[l.category]=[];catOrder.push(l.category);}
      catGroups[l.category].push(l);
    });

    const catBlocksHtml=catOrder.map(cat=>{
      const catItems=catGroups[cat];
      const catMd=catItems.reduce((s,l)=>s+parseFloat(l.manday||0),0);
      // 이 대분류의 모든 사진 모으기
      const allCatPhotos=catItems.flatMap(l=>l.photos||[]);
      const subsHtml=catItems.map(l=>{
        const workers=parseFloat(l.workers)||0;
        const manday=parseFloat(l.manday)||0;
        const hours=workers>0?Math.round(manday*8/workers*100)/100:0;
        return `<div class="log-sub-row">
          <div class="log-sub-info">
            <div class="log-sub-name">${l.sub_category}</div>
            ${l.detail?`<div class="log-sub-detail">${l.detail}</div>`:''}
            <div class="log-sub-stats">
              <span class="stat-pill workers">👷 ${workers}명</span>
              ${hours>0?`<span class="stat-pill hours">⏱ ${hours}h</span>`:''}
              <span class="stat-pill manday">${manday.toFixed(2)} M/D</span>
            </div>
          </div>
          <div class="log-sub-actions">
            <button class="btn bs bsm" onclick="openEditLog(${l.id})">✏️</button>
            <button class="btn bd bsm" onclick="deleteLog(${l.id})">🗑</button>
          </div>
        </div>`;
      }).join('');
      // 대분류별 사진 표시
      const photosHtml=allCatPhotos.length?`
        <div style="padding:8px 0 6px 12px">
          <div style="font-size:11px;color:var(--text-dim);margin-bottom:6px">📷 현장 사진 (${allCatPhotos.length}장)</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">
            ${allCatPhotos.map(p=>`
              <div style="position:relative;aspect-ratio:1;cursor:pointer" onclick="openPhotoViewer('${p.url}')">
                <img src="${p.url}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;border:1px solid var(--border)"
                  onerror="this.style.display='none';this.parentNode.innerHTML='<div style=background:var(--surface2);border-radius:8px;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-dim)>로딩 실패</div>'">
              </div>`).join('')}
          </div>
        </div>`:'';
      return `<div class="log-cat-block">
        <div class="log-cat-block-header">
          <span class="log-cat-block-name">📁 ${cat}</span>
          <span class="log-cat-block-total">${catMd.toFixed(2)} M/D${allCatPhotos.length?' · 📷'+allCatPhotos.length:''}</span>
        </div>
        ${subsHtml}${photosHtml}
      </div>`;
    }).join('');

    return `<div class="log-group">
      <div class="log-group-header" onclick="toggleLogGroup(this)">
        <div>
          <div class="log-group-date">${date} ${weather}</div>
          <div class="log-group-meta">${cats} · 총 ${totalMd.toFixed(2)} M/D · ${maxWorkers}명${manager?' · '+manager:''}</div>
        </div>
        <span style="color:var(--text-dim);font-size:12px">${isLatest?'▼':'▶'}</span>
      </div>
      <div class="log-group-body" style="display:${isLatest?'block':'none'}">${catBlocksHtml}</div>
    </div>`;
  }).join('');
}

function toggleLogGroup(header){
  const body=header.nextElementSibling;
  const arrow=header.querySelector('span');
  if(body.style.display==='none'){ body.style.display='block'; arrow.textContent='▼'; }
  else{ body.style.display='none'; arrow.textContent='▶'; }
}

      <label class="fl">📷 현장 사진 (이 대분류)</label>
      <div class="photo-zone" onclick="document.getElementById('cbph-${cid}').click()">사진 추가</div>
      <input type="file" id="cbph-${cid}" accept="image/*" multiple style="display:none" onchange="handleCatPhoto(event,${cid})">

    </div>`;
  document.getElementById('work-rows').appendChild(div);

function removeCatBlock(cid){
  document.getElementById(`cb-${cid}`)?.remove();
  delete rowPhotos[`cat-${cid}`];
}

function onCbCatChange(cid, existingSubs=null){
  const cat=document.getElementById(`cbc-${cid}`)?.value;
  document.querySelectorAll(`#cb-subs-${cid} .sr-cat-sel`).forEach(sel=>{
    const cur=sel.value;
    const subs=workTypes.filter(w=>w.category===cat);
    sel.innerHTML='<option value="">소분류 선택</option>'+subs.map(w=>`<option value="${w.sub_category}" ${w.sub_category===cur?'selected':''}>${w.sub_category}</option>`).join('');
  });
  const btn=document.getElementById(`cb-done-${cid}`);
  if(btn) btn.style.display=cat?'inline-flex':'none';
  updateCbTotal(cid);
}

function addSubRow(cid, data={}){
  subRowCount++;
  const sid=subRowCount;
  const cat=document.getElementById(`cbc-${cid}`)?.value||''
  const subs=workTypes.filter(w=>w.category===cat);
  const subOpts=subs.map(w=>`<option value="${w.sub_category}" ${data&&data.sub_category===w.sub_category?'selected':''}>${w.sub_category}</option>`).join('');
  const div=document.createElement('div');
  div.id=`sr-${sid}`;
  div.style.cssText='background:var(--sky-dark);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px';
  div.innerHTML=`
    <div style="display:flex;gap:6px;margin-bottom:8px;align-items:center">
      <select class="fs sr-cat-sel" id="src-${sid}" style="flex:1">
        <option value="">소분류 선택</option>${subOpts}
      </select>
      <button class="btn bd bsm" onclick="removeSubRow(${sid},${cid})" style="padding:4px 7px">✕</button>
    </div>
    <div class="fg" style="margin-bottom:8px">
      <textarea class="ft" id="srd-${sid}" style="min-height:48px" placeholder="세부 작업내용">${(data&&data.detail)||''}</textarea>
    </div>
    <div class="fr3">
      <div class="fg"><label class="fl">투입인원</label>
        <input type="number" class="fi" id="srw-${sid}" min="1" placeholder="명" value="${(data&&data.workers)||''}" oninput="calcSrMd(${sid},${cid})">
      </div>
      <div class="fg"><label class="fl">작업시간(h)</label>
        <input type="number" class="fi" id="srh-${sid}" min="0.5" max="24" step="0.5" value="${(data&&data.hours)||8}" oninput="calcSrMd(${sid},${cid})">
      </div>
      <div class="fg"><label class="fl">M/D</label>
        <input type="number" class="fi" id="srm-${sid}" step="0.01" readonly style="color:var(--sun)" value="${(data&&data.manday)?parseFloat(data.manday).toFixed(2):''}" >
      </div>
    </div>`;
  document.getElementById(`cb-subs-${cid}`).appendChild(div);
}

function removeSubRow(sid,cid){
  document.getElementById(`sr-${sid}`)?.remove();
  updateCbTotal(cid);
}

function calcSrMd(sid,cid){
  const w=parseFloat(document.getElementById(`srw-${sid}`)?.value)||0;
  const h=parseFloat(document.getElementById(`srh-${sid}`)?.value)||8;
  const el=document.getElementById(`srm-${sid}`);
  if(el) el.value=w>0?(w*h/8).toFixed(2):'';
  updateCbTotal(cid);
}

function updateCbTotal(cid){
  let total=0;
  document.querySelectorAll(`#cb-subs-${cid} [id^="srm-"]`).forEach(el=>{ total+=parseFloat(el.value)||0; });
  const el=document.getElementById(`cb-total-${cid}`);
  if(el) el.textContent=total>0?`합계 ${total.toFixed(2)} M/D`:'';
}

function toggleCatDone(cid){
  const block=document.getElementById(`cb-${cid}`);
  if(!block) return;
  const done=block.dataset.done==='1';
  block.dataset.done=done?'0':'1';
  block.style.borderColor=done?'var(--border)':'#29B6F6';
  const btn=document.getElementById(`cb-done-${cid}`);
  if(btn){ btn.textContent=done?'완료':'✓ 완료됨'; btn.className=done?'btn bg bsm':'btn bs bsm'; }
}

// 사진 (대분류별)
function handleCatPhoto(e,cid){
  const key=`cat-${cid}`;
  if(!rowPhotos[key]) rowPhotos[key]=[];
  Array.from(e.target.files).forEach(f=>{
    const pidx=rowPhotos[key].length;
    rowPhotos[key].push(f);
    const r=new FileReader();
    r.onload=ev=>{
      const d=document.createElement('div'); d.className='photo-item';
      d.innerHTML=`<img src="${ev.target.result}"><button class="photo-rm" onclick="removeCatPhoto('${key}',${pidx},this.parentNode)">✕</button>`;
      document.getElementById(`cbpg-${cid}`)?.appendChild(d);
    };
    r.readAsDataURL(f);
  });
  e.target.value='';
}
function removeCatPhoto(key,pidx,el){ if(rowPhotos[key]) rowPhotos[key][pidx]=null; el?.remove(); }

async function uploadCatPhotos(logId,cid){
  const key=`cat-${cid}`;
  if(!rowPhotos[key]||!rowPhotos[key].filter(p=>p).length) return;
  const files=rowPhotos[key].filter(p=>p);
  for(const f of files){
    // 파일 확장자 안전하게 처리
    const nameParts=f.name.split('.');
    const ext=nameParts.length>1?nameParts.pop().toLowerCase():'jpg';
    const safeExt=['jpg','jpeg','png','gif','webp','heic','heif'].includes(ext)?ext:'jpg';
    const path=`${logId}/${Date.now()}_${Math.random().toString(36).slice(2)}.${safeExt}`;
    const{data:upData, error:upErr}=await sbClient.storage.from('worklog-photos').upload(path,f,{
      contentType: f.type||'image/jpeg',
      upsert: false
    });
    if(upErr){
      console.error('사진 업로드 실패:', upErr.message, path);
      toast('사진 업로드 실패: '+upErr.message,'err');
      continue;
    }
    const{data:urlData}=sbClient.storage.from('worklog-photos').getPublicUrl(path);
    if(urlData?.publicUrl){
      const{error:dbErr}=await sbClient.from('photos').insert({log_id:logId, url:urlData.publicUrl});
      if(dbErr){
        console.error('사진 DB 저장 실패:', dbErr.message);
        toast('사진 DB 저장 실패: '+dbErr.message,'err');
      }
    }
  }
}

    if(!cat){ toast('대분류를 선택하세요','err'); return; }
    const subRows=block.querySelectorAll('[id^="sr-"]');
    if(!subRows.length){ toast(`${cat}: 소분류를 추가하세요`,'err'); return; }
    for(const sr of subRows){
      const sid=sr.id.replace('sr-','');
      const sub=document.getElementById(`src-${sid}`)?.value;
      const md=parseFloat(document.getElementById(`srm-${sid}`)?.value)||0;
      if(!sub){ toast(`${cat}: 소분류를 선택하세요`,'err'); return; }
      if(!md){ toast(`${cat} > ${sub}: 인원/시간을 입력하세요`,'err'); return; }
      const pIdx=payloads.length;
      payloads.push({work_date:date,category:cat,sub_category:sub,
        detail:document.getElementById(`srd-${sid}`)?.value||'',
        manday:md, workers:parseInt(document.getElementById(`srw-${sid}`)?.value)||null,
        start_time:startTime,end_time:endTime,weather,manager,memo,site_name:siteName});
      if(sr===subRows[0]) photoMap.push({pIdx,cid});
    }
  }
  if(!payloads.length){ toast('작업 항목을 추가하세요','err'); return; }
  const editId=document.getElementById('log-edit-group').value;
  if(editId){
    const{error}=await sbClient.from('daily_logs').update(payloads[0]).eq('id',editId);
    if(error){ toast('수정 실패: '+error.message,'err'); return; }
    for(const pm of photoMap){ if(pm.pIdx===0) await uploadCatPhotos(editId,pm.cid); }
  } else {
    const insertedIds=[];
    for(let i=0;i<payloads.length;i++){
      const{data,error}=await sbClient.from('daily_logs').insert(payloads[i]).select().single();
      if(error){ toast('저장 실패: '+error.message,'err'); return; }
      insertedIds.push(data.id);
    }
    for(const pm of photoMap){ await uploadCatPhotos(insertedIds[pm.pIdx],pm.cid); }
  }
  // 사진 업로드 (있는 경우)
  const hasPhotos=Object.values(rowPhotos).some(arr=>arr&&arr.filter(p=>p).length>0);
  if(hasPhotos) toast('사진 업로드 중...','');
  closeLogModal();
  toast(`${payloads.length}개 작업 저장 완료 ✓`,'ok');
  initDateFilters().then(()=>{ loadLogs(); loadDashboard(); loadSummary(); });
}

async function deleteLog(id){
  if(!confirm('삭제할까요?')) return;
  await sbClient.from('daily_logs').delete().eq('id',id);
  toast('삭제됨','ok'); initDateFilters().then(()=>{ loadLogs(); loadDashboard(); loadSummary(); });
}

// ═══════════════════════════════════════════
// M/D 집계
// ═══════════════════════════════════════════
async function loadSummary(){
  if(!sbClient) return;
  let q=sbClient.from('daily_logs').select('*');
  const from=document.getElementById('sum-from')?.value;
  const to=document.getElementById('sum-to')?.value;
  const search=document.getElementById('sum-search')?.value;
  if(from) q=q.gte('work_date',from);
  if(to) q=q.lte('work_date',to);
  if(search) q=q.eq('category',search);
  const{data:logs,error}=await q;
  const el=document.getElementById('sum-content');
  if(error){ el.innerHTML=`<div class="config-warn">⚠️ ${error.message}</div>`; return; }
  if(!logs||!logs.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📈</div>집계할 데이터가 없습니다</div>'; return; }

  const filtered=logs;

  // 대분류 → 소분류 → 날짜별 집계
  const catMap={};
  filtered.forEach(l=>{
    if(!catMap[l.category]) catMap[l.category]={subs:{},totalMd:0,dates:new Set()};
    catMap[l.category].totalMd+=parseFloat(l.manday||0);
    catMap[l.category].dates.add(l.work_date);
    if(!catMap[l.category].subs[l.sub_category]) catMap[l.category].subs[l.sub_category]={md:0,dates:new Set(),details:[]};
    catMap[l.category].subs[l.sub_category].md+=parseFloat(l.manday||0);
    catMap[l.category].subs[l.sub_category].dates.add(l.work_date);
    if(l.detail) catMap[l.category].subs[l.sub_category].details.push(l.detail);
  });

  const totalMd=filtered.reduce((s,l)=>s+parseFloat(l.manday||0),0);
  const totalDays=new Set(filtered.map(l=>l.work_date)).size;

  let rows=''; let no=1;
  Object.entries(catMap).forEach(([cat,cd])=>{
    rows+=`<tr style="background:var(--surface2)">
      <td colspan="5" style="text-align:left;padding-left:10px;font-weight:700;color:var(--sun)">${cat} <small style="color:var(--text-dim);font-weight:400">${cd.totalMd.toFixed(2)} M/D · ${cd.dates.size}일</small></td>
    </tr>`;
    Object.entries(cd.subs).forEach(([sub,sd])=>{
      const dateChips=[...sd.dates].sort().map(d=>`<span class="date-chip">${d}</span>`).join('');
      rows+=`<tr>
        <td>${no++}</td>
        <td class="left" style="padding-left:16px">${sub}</td>
        <td>${sd.dates.size}</td>
        <td>${sd.md.toFixed(2)}</td>
        <td class="left">${dateChips}</td>
      </tr>`;
    });
  });

  el.innerHTML=`
    <div class="stat-grid" style="grid-template-columns:1fr 1fr;margin-bottom:14px">
      <div class="stat-card"><div class="stat-val">${totalMd.toFixed(2)}</div><div class="stat-lbl">총 M/D</div></div>
      <div class="stat-card"><div class="stat-val">${totalDays}</div><div class="stat-lbl">총 작업일수</div></div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="sum-table">
        <thead><tr><th>No</th><th>소분류</th><th>작업일수</th><th>M/D</th><th>작업날짜</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr class="total"><td colspan="2">합 계</td><td>${totalDays}</td><td>${totalMd.toFixed(2)}</td><td></td></tr></tfoot>
      </table>
    </div>`;
}

// ═══════════════════════════════════════════
// 공종 DB
// ═══════════════════════════════════════════
async function loadWorkTypes(){
  if(!sbClient) return;
  const{data}=await sbClient.from('work_types').select('*').order('sort_order',{ascending:true});
  workTypes=data||[];
  renderWorkTypeList(); populateCategorySelects();
}

function populateCategorySelects(){
  const cats=[]; workTypes.forEach(w=>{if(!cats.includes(w.category)) cats.push(w.category);});
  const opts='<option value="">선택</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  ['log-category'].forEach(id=>{const el=document.getElementById(id);if(el) el.innerHTML=opts;});
  // M/D 집계 드롭다운
  const sumSel=document.getElementById('sum-search');
  if(sumSel){
    const curVal=sumSel.value;
    sumSel.innerHTML='<option value="">전체 공종</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join('');
    if(curVal) sumSel.value=curVal;
  }
}
function clearSumSearch(){
  const el=document.getElementById('sum-search');
  if(el) el.value='';
  loadSummary();
}

function renderWorkTypeList(){
  const el=document.getElementById('wt-list');
  if(!el) return;
  if(!workTypes.length){ el.innerHTML='<div class="empty"><div class="empty-icon">🗂️</div>대분류를 추가해보세요</div>'; return; }
  const catOrder=[]; const catMap={};
  workTypes.forEach(w=>{
    if(!catMap[w.category]){catMap[w.category]=[];catOrder.push(w.category);}
    catMap[w.category].push(w);
  });
  el.innerHTML=catOrder.map(cat=>{
    const sc=cat.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="card" data-cat="${cat}" style="margin-bottom:12px">
      <div class="cat-header-row">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="drag-handle cat-dh">☰</span>
          <strong style="color:var(--sun)">${cat}</strong>
        </div>
        <div style="display:flex;gap:5px">
          <button class="btn bs bsm" onclick="openSubModal('${sc}')">+ 소분류</button>
          <button class="btn bs bsm" onclick="openEditCat('${sc}')">수정</button>
          <button class="btn bd bsm" onclick="deleteCategory('${sc}')">삭제</button>
        </div>
      </div>
      <div class="sub-list" data-cat="${cat}">
        ${catMap[cat].map(w=>{
          const ss=w.sub_category.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          return `<div class="wt-item" data-id="${w.id}">
            <div style="display:flex;align-items:center;gap:8px">
              <span class="drag-handle sub-dh">☰</span>
              <span>${w.sub_category}</span>
            </div>
            <div style="display:flex;gap:5px">
              <button class="btn bs bsm" onclick="openEditSub(${w.id},'${ss}')">수정</button>
              <button class="btn bd bsm" onclick="deleteWorkType(${w.id})">삭제</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  // 드래그
  if(window.Sortable){
    Sortable.create(el,{handle:'.cat-dh',animation:150,onEnd:async()=>{
      const cards=[...el.querySelectorAll('[data-cat]')];
      const ups=[];
      cards.forEach((c,i)=>{
        const cat=c.getAttribute('data-cat');
        workTypes.filter(w=>w.category===cat).forEach(w=>ups.push(sbClient.from('work_types').update({sort_order:i*100+w.sort_order%100}).eq('id',w.id)));
      });
      await Promise.all(ups); await loadWorkTypes();
    }});
    el.querySelectorAll('.sub-list').forEach(sl=>{
      Sortable.create(sl,{handle:'.sub-dh',animation:150,onEnd:async()=>{
        const items=[...sl.querySelectorAll('[data-id]')];
        const cat=sl.getAttribute('data-cat');
        const base=Math.floor((workTypes.find(w=>w.category===cat)?.sort_order||0)/100)*100;
        const ups=items.map((item,i)=>sbClient.from('work_types').update({sort_order:base+i+1}).eq('id',parseInt(item.getAttribute('data-id'))));
        await Promise.all(ups); await loadWorkTypes();
      }});
    });
  }
}

async function addCategory(){
  const cat=document.getElementById('new-cat').value.trim();
  if(!cat){ toast('대분류명을 입력하세요','err'); return; }
  if(workTypes.some(w=>w.category===cat)){ toast('이미 있는 대분류입니다','err'); return; }
  const maxOrder=workTypes.length?Math.max(...workTypes.map(w=>w.sort_order||0)):0;
  const{error}=await sbClient.from('work_types').insert({category:cat,sub_category:'(소분류 없음)',sort_order:maxOrder+10});
  if(error){ toast('추가 실패','err'); return; }
  document.getElementById('new-cat').value='';
  await loadWorkTypes(); toast('대분류 추가됨 ✓','ok');
}

let _subCat='';
function openSubModal(cat){ _subCat=cat; document.getElementById('sub-modal-title').textContent=cat+' > 소분류 추가'; document.getElementById('new-sub-input').value=''; document.getElementById('sub-modal').classList.add('open'); setTimeout(()=>document.getElementById('new-sub-input').focus(),100); }
async function addSubCategory(){
  const sub=document.getElementById('new-sub-input').value.trim();
  if(!sub){ toast('소분류명을 입력하세요','err'); return; }
  const catItems=workTypes.filter(w=>w.category===_subCat);
  const maxOrder=catItems.length?Math.max(...catItems.map(w=>w.sort_order||0)):0;
  const{error}=await sbClient.from('work_types').insert({category:_subCat,sub_category:sub,sort_order:maxOrder+1});
  if(error){ toast('추가 실패','err'); return; }
  document.getElementById('sub-modal').classList.remove('open');
  await loadWorkTypes(); toast('소분류 추가됨 ✓','ok');
}
async function deleteWorkType(id){ if(!confirm('삭제할까요?')) return; await sbClient.from('work_types').delete().eq('id',id); await loadWorkTypes(); toast('삭제됨','ok'); }
async function deleteCategory(cat){ if(!confirm(`'${cat}' 전체를 삭제할까요?`)) return; await sbClient.from('work_types').delete().eq('category',cat); await loadWorkTypes(); toast('삭제됨','ok'); }
function openEditCat(cat){ document.getElementById('en-id').value=''; document.getElementById('en-type').value='cat'; document.getElementById('en-old').value=cat; document.getElementById('en-val').value=cat; document.getElementById('edit-name-modal').classList.add('open'); setTimeout(()=>document.getElementById('en-val').focus(),100); }
function openEditSub(id,name){ document.getElementById('en-id').value=id; document.getElementById('en-type').value='sub'; document.getElementById('en-old').value=name; document.getElementById('en-val').value=name; document.getElementById('edit-name-modal').classList.add('open'); setTimeout(()=>document.getElementById('en-val').focus(),100); }
async function saveNameEdit(){
  const id=document.getElementById('en-id').value, type=document.getElementById('en-type').value;
  const oldV=document.getElementById('en-old').value, newV=document.getElementById('en-val').value.trim();
  if(!newV){ toast('이름을 입력하세요','err'); return; }
  if(type==='cat') await sbClient.from('work_types').update({category:newV}).eq('category',oldV);
  else await sbClient.from('work_types').update({sub_category:newV}).eq('id',id);
  document.getElementById('edit-name-modal').classList.remove('open');
  await loadWorkTypes(); toast('수정됨 ✓','ok');
}

// ═══════════════════════════════════════════
// 현장 관리
// ═══════════════════════════════════════════
async function loadSites(){
  if(!sbClient) return;
  const{data}=await sbClient.from('sites').select('*').order('created_at');
  sites=data||[];
  renderSiteList(); populateSiteSelects();
}
function populateSiteSelects(){
  const opts='<option value="">현장 선택</option>'+sites.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  ['log-site'].forEach(id=>{const el=document.getElementById(id);if(el){el.innerHTML=opts;if(currentSiteId)el.value=currentSiteId;}});
}
function renderSiteList(){
  const el=document.getElementById('site-list'); if(!el) return;
  if(!sites.length){ el.innerHTML='<div style="color:var(--text-dim);font-size:13px">등록된 현장이 없습니다</div>'; return; }
  el.innerHTML=sites.map(s=>{
    const isSel=s.id===currentSiteId||s.id==currentSiteId;
    const sn=s.name.replace(/'/g,"\\'");
    return `<div class="site-item ${isSel?'active':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:13px;font-weight:700">${s.name}${isSel?'<span class="site-badge">선택중</span>':''}</div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:3px">${s.client||''} · ${s.contractor||''} · ${s.start_date||''}</div>
        </div>
        <div style="display:flex;gap:5px;margin-left:8px">
          ${!isSel?`<button class="btn bp bsm" onclick="selectSite(${s.id},'${sn}')">선택</button>`:''}
          <button class="btn bs bsm" onclick="openEditSite(${s.id})">수정</button>
          <button class="btn bd bsm" onclick="deleteSite(${s.id})">삭제</button>
        </div>
      </div>
    </div>`;
  }).join('');
}
function selectSite(id,name){
  currentSiteId=parseInt(id);
  localStorage.setItem('sel_site_id',id);
  localStorage.setItem('sel_site_name',name);
  updateHeaderSite(name);
  renderSiteList(); populateSiteSelects();
  loadDashboard();
  toast(name+' 선택됨 ✓','ok');
}
async function addSite(){
  const name=document.getElementById('new-site-name').value.trim();
  if(!name){ toast('현장명을 입력하세요','err'); return; }
  const{error}=await sbClient.from('sites').insert({name,client:document.getElementById('new-site-client').value.trim(),contractor:document.getElementById('new-site-contractor').value.trim(),start_date:document.getElementById('new-site-start').value||null,end_date:document.getElementById('new-site-end').value||null});
  if(error){ toast('추가 실패','err'); return; }
  ['new-site-name','new-site-client','new-site-contractor','new-site-start','new-site-end'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
  await loadSites(); toast('현장 추가됨 ✓','ok');
}
async function deleteSite(id){
  if(!confirm('현장을 삭제할까요?')) return;
  if(id==currentSiteId){ currentSiteId=null; localStorage.removeItem('sel_site_id'); localStorage.removeItem('sel_site_name'); updateHeaderSite(null); }
  await sbClient.from('sites').delete().eq('id',id);
  await loadSites(); toast('삭제됨','ok');
}
function openEditSite(id){
  const s=sites.find(x=>x.id===id); if(!s) return;
  document.getElementById('es-id').value=s.id;
  document.getElementById('es-name').value=s.name||'';
  document.getElementById('es-client').value=s.client||'';
  document.getElementById('es-contractor').value=s.contractor||'';
  document.getElementById('es-location').value=s.location||'';
  document.getElementById('es-start').value=s.start_date||'';
  document.getElementById('es-end').value=s.end_date||'';
  document.getElementById('edit-site-modal').classList.add('open');
}
async function saveEditSite(){
  const id=document.getElementById('es-id').value;
  const name=document.getElementById('es-name').value.trim();
  if(!name){ toast('현장명을 입력하세요','err'); return; }
  const{error}=await sbClient.from('sites').update({name,client:document.getElementById('es-client').value.trim(),contractor:document.getElementById('es-contractor').value.trim(),location:document.getElementById('es-location').value.trim(),start_date:document.getElementById('es-start').value||null,end_date:document.getElementById('es-end').value||null}).eq('id',id);
  if(error){ toast('수정 실패','err'); return; }
  if(id==currentSiteId){ localStorage.setItem('sel_site_name',name); updateHeaderSite(name); }
  document.getElementById('edit-site-modal').classList.remove('open');
  await loadSites(); toast('수정됨 ✓','ok');
}

function openExportModal(){ document.getElementById('export-modal').classList.add('open'); }
async function exportCSV(){
  const{data:logs}=await sbClient.from('daily_logs').select('*').order('work_date');
  if(!logs||!logs.length){ toast('데이터가 없습니다','err'); return; }
  const h=['날짜','현장','대분류','소분류','세부내용','투입인원','M/D','시작','종료','날씨','확인자','메모'];
  const rows=logs.map(l=>[l.work_date,l.site_name||'',l.category,l.sub_category,l.detail||'',l.workers||'',l.manday,l.start_time||'',l.end_time||'',l.weather||'',l.manager||'',l.memo||''].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv='\uFEFF'+[h.join(','),...rows].join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=`작업일지_${new Date().toISOString().split('T')[0]}.csv`; a.click();
  document.getElementById('export-modal').classList.remove('open');
}

function openPhotoViewer(url){
  document.getElementById('photo-viewer-img').src=url;
  document.getElementById('photo-viewer-dl').href=url;
  document.getElementById('photo-viewer-modal').classList.add('open');
}
function closePhotoViewer(){
  document.getElementById('photo-viewer-modal').classList.remove('open');
  document.getElementById('photo-viewer-img').src='';
}

// 사진 내보내기 (zip 없이 순차 다운로드)
async function exportPhotos(){
  document.getElementById('export-modal').classList.remove('open');
  toast('사진 목록 불러오는 중...','');
  const{data:photos,error}=await sbClient.from('photos').select('url,log_id,daily_logs(work_date,category,site_name)').order('log_id');
  if(error||!photos||!photos.length){ toast('저장된 사진이 없습니다','err'); return; }
  toast(`사진 ${photos.length}장 다운로드 시작...`,'ok');
  // 순차적으로 a 태그 클릭으로 다운로드
  for(let i=0;i<photos.length;i++){
    const p=photos[i];
    const date=p.daily_logs?.work_date||'unknown';
    const cat=(p.daily_logs?.category||'기타').replace(/[/\:*?"<>|]/g,'_');
    const ext=p.url.split('.').pop().split('?')[0]||'jpg';
    const filename=`${date}_${cat}_${i+1}.${ext}`;
    await new Promise(res=>{
      const a=document.createElement('a');
      a.href=p.url; a.download=filename; a.target='_blank';
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      setTimeout(res, 400); // 브라우저 다운로드 간격
    });
  }
  toast(`${photos.length}장 다운로드 완료 ✓`,'ok');
}

// 유틸
// ═══════════════════════════════════════════
function toast(msg,type=''){
  const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show '+type;
  setTimeout(()=>t.className='toast',2500);
}
